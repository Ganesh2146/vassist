# Render Blueprint for V-Assist (backend + frontend)
# Docs: https://render.com/docs/blueprint-spec

services:
  # -------------------- Backend API --------------------
  - type: web
    name: vassist-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

      # Allow the deployed frontend origin(s) (adjust if you rename the static site)
      - key: CORS_ORIGINS
        value: https://vassist-frontend.onrender.com,https://vassist1-j2b0.onrender.com

      # Database (recommended): create a Render Postgres DB and set DATABASE_URL.
      # If you add a Render Postgres database, replace this value with the Render-provided URL.
      # (This app also supports `postgres://...` URLs from Render.)
      - key: DATABASE_URL
        value: sqlite:////tmp/vassist.db

      # Optional integrations
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: WHISPER_MODEL
        value: whisper-1

      # Email (optional)
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: MAIL_SUPPRESS_SEND
        value: "True"

  # -------------------- Frontend (Vite static site) --------------------
  - type: web
    name: vassist-frontend
    runtime: static
    rootDir: h/front
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      # Points the frontend to the backend service.
      # If you rename the backend service, update this URL.
      - key: VITE_API_BASE_URL
        value: https://vassist-02.onrender.com/api

    # SPA routing: send all routes to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
